<div class="section specialties-section">
    <h2 nz-typography class="section-title">All Clinics</h2>
    <p class="section-subtitle">Browse clinics to view available clinics</p>
    <div class="location-filter">
    <nz-select nzPlaceHolder="City" style="width: 30%;">
        <nz-option nzValue="Yangon" nzLabel="Yangon" />
        <nz-option nzValue="Mandalay" nzLabel="Mandalay" />
    </nz-select>
    <nz-select nzPlaceHolder="Township" style="width: 30%;">
        <nz-option nzValue="Tamwe" nzLabel="Tamwe" />
        <nz-option nzValue="Tarkayta" nzLabel="Tarkayta" />
    </nz-select>
    </div>
    <div nz-row [nzGutter]="[24, 24]">
        <div nz-col [nzXs]="24" [nzSm]="12" [nzMd]="8" *ngFor="let clinic of clinics">
            <nz-card nzHoverable class="specialty-card">
                <div class="specialty-content">
                    <span nz-icon nzType="medicine-box" nzTheme="outline" class="specialty-icon"></span>
                    <h4 nz-typography>{{ clinic.name }}</h4>
                    <p nz-typography nzType="secondary">{{ clinic.address }}</p>
                    <p nz-typography nzType="secondary">
                        {{ clinic.city }}
                    </p>
                </div>
            </nz-card>
        </div>
    </div>
