<div class="appointment-section">
    <div class="section-header">
        <h2 nz-typography class="section-title">Book an Appointment</h2>
        <p class="section-subtitle">Select a time slot to book your appointment with Doctor ID: {{ doctorId }} at Clinic ID: {{ clinicId }}</p>
        <div class="week-navigation">
            <button nz-button nzType="default" (click)="previousWeek()" [disabled]="currentWeekOffset === 0">
                <span nz-icon nzType="left"></span> Previous Week
            </button>
            <span class="current-week-label">
                {{ currentWeekOffset === 0 ? 'Current Week' : 'Next Week' }}
            </span>
            <button nz-button nzType="default" (click)="nextWeek()" [disabled]="currentWeekOffset >= 1">
                Next Week <span nz-icon nzType="right"></span>
            </button>
        </div>
    </div>

    <nz-card class="schedule-card">
        <nz-tabs class="schedule-tabs">
            <nz-tab *ngFor="let day of schedule; let dayIndex = index" [nzTitle]="tabTitle">
                <ng-template #tabTitle>
                    <div class="tab-title-content">
                        <span class="day-name">{{ day.dayName }}</span>
                        <span class="day-date">{{ day.formattedDate }}</span>
                    </div>
                </ng-template>

                <div class="slots-container">
                    <h4 nz-typography class="slots-header">Available Time Slots</h4>
                    <div class="slots-grid">
                        <ng-container *ngFor="let slot of day.slots; let slotIndex = index">
                            <button
                                nz-button
                                [nzType]="slot.isBooked ? 'default' : 'primary'"
                                [nzGhost]="!slot.isBooked"
                                [disabled]="slot.isBooked"
                                class="time-slot-btn"
                                [class.booked]="slot.isBooked"
                                (click)="bookSlot(dayIndex, slotIndex, slot.time)">
                                {{ slot.time }}
                            </button>
                        </ng-container>
                    </div>
                </div>
            </nz-tab>
        </nz-tabs>
    </nz-card>
</div>
