<form nz-form [formGroup]="validateForm" class="login-form" (ngSubmit)="submitForm()">
    <nz-form-item>
        <nz-form-control nzErrorTip="Enter Your Email">
            <nz-input-wrapper>
                <nz-icon nzInputPrefix nzType="mail" />
                <input nz-input formControlName="email" placeholder="Email" />
            </nz-input-wrapper>
        </nz-form-control>
    </nz-form-item>
    <nz-form-item>
        <nz-form-control nzErrorTip="Enter Your Password">
           <nz-input-password>
                <nz-icon nzInputPrefix nzType="lock" />
                <input nz-input type="password" formControlName="password" placeholder="Password" />
           </nz-input-password>
        </nz-form-control>
    </nz-form-item>
    <div nz-row class="login-form-margin">
        <div nz-col [nzSpan]="12">
            <label nz-checkbox formControlName="remember">
                Remember me
            </label>
        </div>
        <button nz-button class="login-form-button login-form-margin" nzType="primary" [disabled]="validateForm.invalid"
            [nzLoading]="loading">Log in</button>
        Or &nbsp;
        <a routerLink="/register">
            Register now!
        </a>
    </div>
</form>
